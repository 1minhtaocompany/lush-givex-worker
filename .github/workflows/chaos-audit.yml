name: "🔥 Chaos Audit — Core Engine"

on:
  push:
    branches: [main]
    paths:
      - "tests/run_chaos_test.py"
      - ".github/workflows/chaos-audit.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "How long (seconds) each worker runs"
        required: false
        default: "30"
      chaos_probability:
        description: "Probability (0.0–1.0) of injecting a chaos exception"
        required: false
        default: "0.4"

permissions:
  contents: read

jobs:
  chaos-audit:
    name: chaos-audit
    runs-on: ubuntu-latest
    timeout-minutes: 2  # 4× the default 30-second test duration; if the job exceeds this,
                        # GitHub force-kills it — which itself proves a deadlock occurred.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate script syntax
        run: python -m py_compile tests/run_chaos_test.py

      - name: Print environment info
        run: |
          echo "Python version: $(python --version)"
          echo "CPU cores: $(nproc)"
          echo "RAM: $(free -h | awk '/^Mem:/ {print $2}')"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Run chaos test
        id: chaos_run
        run: |
          python -u tests/run_chaos_test.py 2>&1 | tee chaos_output.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          if   [ "${EXIT_CODE}" -eq 0 ]; then echo "result=PASSED"            >> "$GITHUB_OUTPUT"
          elif [ "${EXIT_CODE}" -eq 1 ]; then echo "result=THREAD_LEAK"       >> "$GITHUB_OUTPUT"
          elif [ "${EXIT_CODE}" -eq 2 ]; then echo "result=FSM_STATE_LEAK"    >> "$GITHUB_OUTPUT"
          elif [ "${EXIT_CODE}" -eq 3 ]; then echo "result=DEADLOCK"          >> "$GITHUB_OUTPUT"
          else                                echo "result=TIMEOUT_DEADLOCK"  >> "$GITHUB_OUTPUT"
          fi
          exit "${EXIT_CODE}"

      - name: Test summary
        if: always()
        run: |
          echo "Chaos test result: ${{ steps.chaos_run.outputs.result }} (exit code ${{ steps.chaos_run.outputs.exit_code }})"
          case "${{ steps.chaos_run.outputs.result }}" in
            PASSED)           echo "✅ All checks passed — engine is chaos-resistant." ;;
            THREAD_LEAK)      echo "❌ Thread leak detected — workers left dangling threads." ;;
            FSM_STATE_LEAK)   echo "❌ FSM state leak — InvalidStateError/InvalidTransitionError raised under load." ;;
            DEADLOCK)         echo "❌ Deadlock detected — worker thread(s) failed to terminate." ;;
            TIMEOUT_DEADLOCK) echo "❌ Job timed out — likely a deadlock (GitHub force-killed the job)." ;;
            *)                echo "⚠️  Unknown result." ;;
          esac

      - name: Upload chaos log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-log-${{ github.run_number }}
          path: chaos_output.log
          retention-days: 7

      - name: Write GitHub Step Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🔥 Chaos Audit Result

          | Field      | Value |
          |------------|-------|
          | **Result** | ${{ steps.chaos_run.outputs.result }} |
          | **Exit Code** | ${{ steps.chaos_run.outputs.exit_code }} |
          | **Run Number** | ${{ github.run_number }} |
          | **Commit SHA** | ${{ github.sha }} |
          | **Actor** | ${{ github.actor }} |

          ### Exit Code Reference
          | Code | Meaning |
          |------|---------|
          | `0` | PASSED — all workers finished cleanly |
          | `1` | THREAD_LEAK — surplus threads still alive after join |
          | `2` | FSM_STATE_LEAK — InvalidStateError/InvalidTransitionError detected |
          | `3` | DEADLOCK — worker thread(s) did not terminate within timeout |
          | timeout | TIMEOUT_DEADLOCK — job exceeded 2-minute limit (GitHub force-kill) |
          EOF
